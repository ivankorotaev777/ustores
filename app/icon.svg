<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 60" fill="none">
  <!-- Monitor outer -->
  <rect x="10" y="2" width="52" height="40" rx="5" fill="#1e3a5f" stroke="white" stroke-width="3"/>
  <!-- Monitor screen -->
  <rect x="16" y="8" width="40" height="27" rx="2" fill="white"/>
  <!-- Monitor stand -->
  <path d="M30 42 L30 47 L42 47 L42 42" fill="#1e3a5f"/>
  <!-- Monitor base -->
  <ellipse cx="36" cy="49" rx="8" ry="3" fill="#1e3a5f" stroke="white" stroke-width="2"/>
  
  <!-- Shopping cart -->
  <g>
    <!-- Cart handle -->
    <path d="M36 30 L44 30 L49 44" stroke="#1e3a5f" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M36 30 L44 30 L49 44" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cart body -->
    <path d="M46 34 L51 23 L90 23 L94 45 L53 45 Z" fill="#1e3a5f" stroke="white" stroke-width="2.5"/>
    <!-- Wheels -->
    <circle cx="60" cy="52" r="5" fill="#1e3a5f" stroke="white" stroke-width="2"/>
    <circle cx="84" cy="52" r="5" fill="#1e3a5f" stroke="white" stroke-width="2"/>
  </g>
</svg>
