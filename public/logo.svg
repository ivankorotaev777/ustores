<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 55" fill="none">
  <!-- Monitor outer -->
  <rect x="12" y="2" width="50" height="38" rx="5" fill="#1e3a5f" stroke="white" stroke-width="3"/>
  <!-- Monitor screen -->
  <rect x="17" y="7" width="40" height="26" rx="2" fill="white"/>
  <!-- Monitor stand -->
  <path d="M32 40 L32 44 L42 44 L42 40" fill="#1e3a5f"/>
  <!-- Monitor base -->
  <ellipse cx="37" cy="46" rx="8" ry="3" fill="#1e3a5f" stroke="white" stroke-width="2"/>
  
  <!-- Shopping cart -->
  <g>
    <!-- Cart handle -->
    <path d="M38 28 L45 28 L50 42" stroke="#1e3a5f" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M38 28 L45 28 L50 42" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cart body -->
    <path d="M48 32 L52 22 L88 22 L92 42 L54 42 Z" fill="#1e3a5f" stroke="white" stroke-width="2.5"/>
    <!-- Wheels -->
    <circle cx="60" cy="48" r="5" fill="#1e3a5f" stroke="white" stroke-width="2"/>
    <circle cx="82" cy="48" r="5" fill="#1e3a5f" stroke="white" stroke-width="2"/>
  </g>
</svg>
